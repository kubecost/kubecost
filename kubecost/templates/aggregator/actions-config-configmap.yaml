{{- if .Values.kubecostProductConfigs.actions.config.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubecost.actions.configMapName" . }}
  labels:
    {{- include "kubecost.commonLabels" . | nindent 4 }}
data:
  config.yaml: |-
{{- toYaml .Values.kubecostProductConfigs.actions.config | nindent 4 }}
{{- end -}}