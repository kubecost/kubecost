{{- if (.Values.aggregator).enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-configs-locked
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecost.commonLabels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.kubecostProductConfigs.lockedApiConfigs }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end -}}
