{{- if (.Values.aggregator).enabled }}
{{- $defaults := include "kubecost.apiConfigDefaults" . | fromYaml -}}
{{- $lmc := .Values.kubecostProductConfigs.labelMappingConfigs | default dict -}}
{{- $kpc := .Values.kubecostProductConfigs -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ default "api-configs" .Values.kubecostProductConfigs.apiConfigMapName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecost.commonLabels" . | nindent 4 }}
data:
  {{- /* For each api config key: use the admin's override if they set one
         (checked by key presence, so false/0/"" are honored), else the chart
         default from the single-source helper. */ -}}
  {{- range $k, $default := $defaults }}
  {{ $k }}: {{ if hasKey $lmc $k }}{{ get $lmc $k | quote }}{{ else if hasKey $kpc $k }}{{ get $kpc $k | quote }}{{ else }}{{ $default | quote }}{{ end }}
  {{- end }}
{{- end -}}
