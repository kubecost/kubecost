{{/*
Component Service Accounts Template
This template creates service accounts for components that have serviceAccount.components.<component>.create set to true
*/}}

{{/* Global Service Account */}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubecost.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecost.commonLabels" . | nindent 4 }}
    {{- with .Values.serviceAccount.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
{{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
---
{{- end }}

{{/* Cluster Controller Service Account */}}
{{- if and (.Values.clusterController.enabled) eq (include "kubecost.componentServiceAccountCreate" (dict "component" "clustercontroller" "context" .)) "true" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubecost.componentServiceAccountName" (dict "component" "clustercontroller" "context" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecost.commonLabels" . | nindent 4 }}
    {{- with .Values.serviceAccount.components.clustercontroller.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- with .Values.serviceAccount.components.clustercontroller.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
{{- end }}
automountServiceAccountToken: {{ include "kubecost.componentServiceAccountAutomount" (dict "component" "clustercontroller" "context" .) }}
---
{{- end }}

