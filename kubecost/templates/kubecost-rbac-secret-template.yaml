{{- if eq (include "kubecost.rbacTeams.enabled" .) "true" }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: kubecost-rbac-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecost.commonLabels" . | nindent 4 }}
stringData:
  key: {{ include "kubecost.rbacAuthSecretValue" . }}
{{- end }}
