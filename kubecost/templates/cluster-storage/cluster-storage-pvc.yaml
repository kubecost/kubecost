{{- if and ((.Values.clusterStorage).persistentVolume).enabled (not ((.Values.clusterStorage).persistentVolume).existingClaim) -}}
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: {{ template "kubecost.clusterStorage.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecost.commonLabels" . | nindent 4 }}
    {{- with .Values.clusterStorage.persistentVolume.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.clusterStorage.persistentVolume.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.clusterStorage.persistentVolume.storageClass }}
  storageClassName: {{ .Values.clusterStorage.persistentVolume.storageClass }}
  {{ end }}
  resources:
    requests:
    {{- if .Values.clusterStorage.persistentVolume }}
      storage: {{ .Values.clusterStorage.persistentVolume.size }}
    {{- else }}
      storage: 32.0Gi
    {{ end }}
{{- end -}}