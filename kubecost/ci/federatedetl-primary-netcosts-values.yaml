global:
  federatedStorage:
    existingSecret: federated-storage-config
  clusterId: helm-testing
#  cloudCost:
#  cloudIntegrationSecret: cloud-integration
serviceAccount:  # this example uses AWS IRSA, which creates a service account with rights to the s3 bucket. If using keys+secrets in the federated storage, set create: true
  create: true
networkCosts:
  # optional, see: https://www.ibm.com/docs/en/kubecost/self-hosted/2.x?topic=configuration-network-cost
  enabled: true
  config:
    services:
      # set the appropriate cloud provider to true
      amazon-web-services: true
      # google-cloud-services: true
      # azure-cloud-services: true
aggregator:
  resources:
    limits:
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 2Gi
finopsagent:
  enabled: false
