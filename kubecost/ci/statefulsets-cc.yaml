### This test is to verify that Kubecost aggregator is deployed as a StatefulSet,
### cluster controller is installed
global:
  clusterId: CLUSTER_ID
  federatedStorage:
    existingSecret: federated-storage-config
  podAnnotations:
    kubecost.io/test1: value1
    kubecost.io/test2: value2
  additionalLabels:
    kubecosttest1: value1
    kubecosttest2: value2

aggregator:
  resources:
    limits:
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 2Gi
clusterController:
  enabled: true
  actionConfigs:
    clusterTurndown:
      - name: my-schedule2
        start: "2034-02-09T00:00:00Z"
        end: "2034-02-09T01:00:00Z"
        repeat: none
finopsAgent:
  enabled: false

