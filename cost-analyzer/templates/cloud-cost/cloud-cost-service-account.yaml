{{/*
  A cloud integration secret is required for cloud cost to function as a dedicated pod.
  UI based configuration is not supported for cloud cost with aggregator.
*/}}

{{- if or (.Values.cloudCost).cloudIntegrationSecret (.Values.cloudCost).cloudIntegrationJSON }}
{{- if and .Values.serviceAccount.create .Values.cloudCost.serviceAccountName }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ template "kubecost.cloudCost.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecost.cloudCost.commonLabels" . | nindent 4 }}
{{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
