{{- if and .Values.clusterController.enabled .Values.clusterController.createPrimaryApiSecret }}
{{- if and .Values.clusterController.createPrimaryApiSecret (lt (len .Values.clusterController.primaryApiKey) 5) }}
{{- fail "\n\nWhen clusterController.createPrimaryApiSecret is true, primaryApiKey must be set." }}
{{- end }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ .Values.clusterController.primaryApiSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-analyzer.commonLabels" . | nindent 4 }}
data:
  kubecostAPIKey: {{ .Values.clusterController.primaryApiKey | b64enc }}
{{- end }}
