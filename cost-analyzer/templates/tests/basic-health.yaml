---
apiVersion: v1
kind: Pod
metadata:
  name: basic-health
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- include "kubecost.test.annotations" . | nindent 4 }}
  labels:
    app: basic-health
    app.kubernetes.io/name: basic-health
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  automountServiceAccountToken: false
  restartPolicy: Never
  securityContext:
    seccompProfile:
      type: RuntimeDefault
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 3000
    fsGroup: 2000
  containers:
  - name: test-kubecost
    image: {{ (.Values.basicHealth).fullImageName | default "alpine/k8s:1.33.2" }}
    securityContext:
      privileged: false
      capabilities:
        drop:
        - ALL
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
    command:
      - /bin/sh
    args:
      - -c
      - |
        set -x
        svc="{{ .Release.Name }}-frontend"
        echo "Getting current Kubecost state."
        curl -vvv http://${svc}:9090/model/healthz
        # TODO: replace with healthz once we have it
        # response=$(curl -sL -w "%{http_code}" http://${svc}:9090/model/healthz)
        response=$(curl -sL -w "%{http_code}" http://${svc}:9090/ -o /dev/null)
        if echo "$response" | grep -q "200"; then
          echo "Got Kubecost 200. Successful."
          exit 0
        else
          echo "Failed to fetch Kubecost 200. Response code was $response"
          exit 1
        fi
