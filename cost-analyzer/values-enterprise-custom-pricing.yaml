enterpriseCustomPricing:
  enabled: true
  location:
    URI: /var/kubecost-enterprise-pricing-csv/pricing-spec.csv  # local ConfigMap
  # By default, enterprise custom pricing takes effect moving forward from when
  # it is enabled. To price all historic data according to the given pricing
  # spec, set "applyRetroactively" to true, below.
  # applyRetroactively: true

# This value will only be required until the release of Kubecost 3.0.0, at which point it will be removed
kubecostAggregator:
  useDBv3: true
  # kubectl create configmap -n kubecost enterprise-pricing-csv --from-file pricing-spec.csv
  extraVolumeMounts:
    - name: kubecost-enterprise-pricing-csv
      mountPath: /var/kubecost-enterprise-pricing-csv

extraVolumes:
  - name: kubecost-enterprise-pricing-csv
    configMap:
      name: enterprise-pricing-csv