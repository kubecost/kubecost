### This test is to verify that Kubecost aggregator is deployed as a StatefulSet,
### cluster controller is installed
global:
  podAnnotations:
    kubecost.io/test1: value1
    kubecost.io/test2: value2
  additionalLabels:
    kubecosttest1: value1
    kubecosttest2: value2
  kubecostProductConfigs:
  clusterName: CLUSTER_NAME
kubecostAggregator:
  deployMethod: statefulset
  resources:
    limits:
      memory: 10Gi
    requests:
      cpu: 2000m
      memory: 10Gi
kubecostModel:
  federatedStorageConfigSecret: federated-store
clusterController:
  enabled: true
  actionConfigs:
    clusterTurndown:
      - name: my-schedule2
        start: "2034-02-09T00:00:00Z"
        end: "2034-02-09T01:00:00Z"
        repeat: none
