global:
  grafana:
    enabled: false
    proxy: false
clusterController:
  enabled: true
  actionConfigs:
    containerRightsize:
      filterConfig:
        - filter: |
            controllerKind:"deployment"
      schedule:
        start: "2024-09-01T00:00:00Z"
        frequencyMinutes: 120
        recommendationQueryWindow: "48h"
        targetUtilizationCPU: 0.8
        targetUtilizationMemory: 0.8
kubecostProductConfigs:
  productKey:
    enabled: true
    key: kc-e1234
