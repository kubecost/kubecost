name: Check Links

on:
  repository_dispatch:
  workflow_dispatch:
  pull_request:
    branches:
      - develop
  schedule:
    - cron: "0 0 * * *"

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout github-actions
        uses: actions/checkout@v6
        with:
          repository: kubecost/github-actions
          token: ${{ secrets.ACTION_PAT }}
          path: .github-actions
          sparse-checkout: lychee-action

      ## Recursively check all markdown and yaml files for broken links
      ## Ref: https://github.com/lycheeverse/lychee#commandline-parameters
      - name: Link Checker
        id: lychee
        uses: ./.github-actions/lychee-action
        with:
          fail: true
          debug: false
          args: --verbose --include-fragments --no-progress -E './**/*.md' './**/*.yaml' './**/*.yml'
