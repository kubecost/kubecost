name: Check Links

on:
  repository_dispatch:
  workflow_dispatch:
  pull_request:
    branches:
      - develop
  schedule:
    - cron: "0 0 * * *"

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      ## Recursively check all markdown and yaml files for broken links
      ## Ref: https://github.com/lycheeverse/lychee#commandline-parameters
      - name: Link Checker
        id: lychee
        uses: kubecost/github-actions/lychee-action@e9abae7eb1051daabf263ff7bad15e4deaff72a8 # main as of 2026-05-29
        with:
          fail: true
          debug: false
          args: --verbose --include-fragments --no-progress -E './**/*.md' './**/*.yaml' './**/*.yml'
