name: Label Checker
on:
    pull_request:
        branches:
            - develop
        types:
            - opened
            - synchronize
            - reopened
            - labeled
            - unlabeled
    merge_group:
      types: [checks_requested]

jobs:
  check_labels:
    name: Check labels
    runs-on: ubuntu-latest
    steps:
      - name: Check out actions code
        uses: actions/checkout@v6
        with:
          repository: kubecost/github-actions
          path: ./github-actions
          ref: main
          token: ${{ secrets.GH_PAT }}

      - id: check-labels
        uses: ./github-actions/required-labels-action
        with:
          mode: minimum
          count: 1
          add_comment: true
          message: "This PR requires a version label that you want the PRd feature to be released in, in the form of vMAJOR.MINOR"
          use_regex: true
          labels: | 
              ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)
              dependencies