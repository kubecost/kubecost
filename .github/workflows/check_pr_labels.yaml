name: Label Checker
on:
    pull_request:
        branches:
            - develop
        types:
            - opened
            - synchronize
            - reopened
            - labeled
            - unlabeled
    merge_group:
      types: [checks_requested]

jobs:
  check_labels:
    name: Check labels
    runs-on: ubuntu-latest
    steps:
      - id: check-labels
        uses: mheap/github-action-required-labels@v5
        with:
          mode: minimum
          count: 1
          add_comment: true
          message: "This PR requires a version label that you want the PRd feature to be released in, in the form of vMAJOR.MINOR"
          use_regex: true
          labels: |
              ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)
              dependencies
