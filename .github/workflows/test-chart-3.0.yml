name: Chart build and test 3.x

on:
  workflow_dispatch: {}
  # Normally using pull_request_target along with checking out the ref of the PR is not
  # a good idea, but this is low risk since it's a Helm chart repo.
  # pull_request_target:
  #   types: [opened, synchronize, reopened, ready_for_review]
  pull_request:
    branches:
      - develop

# Prevents multiple runs of the same workflow on the same branch from executing 
# simultaneously. Saves resources.
# Ref: https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/control-the-concurrency-of-workflows-and-jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up chart-testing
        uses: helm/chart-testing-action@0d28d3144d3a25ea2cc349d6e59901c4ff469b3b # v2.7.0

      - name: Add finops-agent-chart
        run: helm repo add finops-agent https://kubecost.github.io/finops-agent-chart

      # Lint all chart values including those in the ci directory.
      - name: Run chart-testing (lint)
        run: ct lint --chart-dirs=kubecost/ --charts kubecost/ --validate-maintainers=false

      - name: Print Helm template output for debugging
        if: failure()
        run: helm template kubecost/ -f kubecost/ci/aggregator-values.yaml

      # TODO: Need to remove "--set kubecostModel.federatedStorageConfig=tmp" before 3.0 release.

      # Run `helm template` on the main values file plus all those in the ci directory.
      - name: Helm template
        run: |
          helm template kubecost/ -f kubecost/values.yaml --set kubecostModel.federatedStorageConfig=tmp > full.yaml
          directory="kubecost/ci"
          for file in "$directory"/*; do
          if [ -f "$file" ]; then
              helm template kubecost/ -f "$file" >> full.yaml
          fi
          done

      # Run Kubeconform on the combined, templatized output across all tested values stored in `full.yaml`.
      # Ensure all the rendered resources are valid.
      - name: Kubeconform
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          entrypoint: /kubeconform
          args: "-summary -ignore-missing-schemas -output text full.yaml"
