name: Chart build and test 3.x

on:
  workflow_dispatch: {}
  # Normally using pull_request_target along with checking out the ref of the PR is not
  # a good idea, but this is low risk since it's a Helm chart repo.
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

  # Uncomment this if you need to actively test this workflow from a PR draft
  # pull_request:
  #   branches:
  #     - develop

# Prevents multiple runs of the same workflow on the same branch from executing 
# simultaneously. Saves resources.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up chart-testing
        uses: helm/chart-testing-action@0d28d3144d3a25ea2cc349d6e59901c4ff469b3b # v2.7.0

      - name: Add finops-agent-chart
        uses: actions/checkout@v5
        with:
          repository: kubecost/finops-agent-chart
          ref: main
          path: finops-agent-chart

      # Lint all chart values including those in the ci directory.
      - name: Run chart-testing (lint)
        run: ct lint --chart-dirs=kubecost/ --charts kubecost/ --validate-maintainers=false

      # Build the finops-agent subchart and make it available for the main chart
      - name: Build finops-agent subchart
        run: |
          # Package the finops-agent chart
          helm dependency build finops-agent-chart/charts/finops-agent
          helm package finops-agent-chart/charts/finops-agent
          
          # Create charts directory if it doesn't exist
          mkdir -p kubecost/charts
          
          # Move the packaged chart to the kubecost charts directory
          mv finops-agent-*.tgz kubecost/charts/

      # Run `helm template` on the main values file plus all those in the ci directory.
      - name: Helm template
        run: |
          helm template kubecost/ -f .github/ci-helmValues/helmValues-federated-store.yaml --debug > full.yaml
          directory="kubecost/ci"
          for file in "$directory"/*; do
          if [ -f "$file" ]; then
              echo "Templating file $file"
              helm template kubecost/ -f "$file" --debug >> full.yaml
          fi
          done

      # Run Kubeconform on the combined, templatized output across all tested values stored in `full.yaml`.
      # Ensure all the rendered resources are valid.
      - name: Kubeconform
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          entrypoint: /kubeconform
          args: "-summary -ignore-missing-schemas -output text full.yaml"
